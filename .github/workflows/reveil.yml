name: Reveil Automatique Streamlit

on:
  schedule:
    # Tourne tous les jours à 6h00 du matin (UTC)
    - cron: '0 6 * * *'
  workflow_dispatch: # Permet de lancer le bouton manuellement

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Préparation de Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installation du navigateur fantôme (Playwright)
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Visite de l'application Saint Charles
        run: |
          python -c "
          from playwright.sync_api import sync_playwright
          import time

          # 👇 METS TON VRAI LIEN STREAMLIT JUSTE EN DESSOUS 👇
          URL = 'https://numerique-saint-charles.streamlit.app'

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              print(f'🌐 Navigation vers {URL} ...')
              
              try:
                  # On demande au robot d'aller sur la page
                  page.goto(URL, timeout=60000)
                  # On le fait patienter 15 secondes sur la page pour valider la présence
                  time.sleep(15)
                  print('✅ Application réveillée avec succès !')
              except Exception as e:
                  print(f'❌ Erreur lors de la navigation : {e}')
              finally:
                  browser.close()
          "
